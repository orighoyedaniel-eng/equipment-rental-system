<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="container mt-4">
    <h2>Admin Dashboard</h2>
    <form id="addEquipmentForm" class="mb-3">
      <h4>Add Equipment</h4>
      <input type="text" name="name" placeholder="Name" class="form-control mb-2" required>
      <input type="text" name="category" placeholder="Category" class="form-control mb-2">
      <input type="text" name="serial_number" placeholder="Serial Number" class="form-control mb-2">
      <input type="text" name="item_condition" placeholder="Condition" class="form-control mb-2">
      <input type="number" name="quantity" placeholder="Quantity" class="form-control mb-2">
      <button class="btn btn-success">Add</button>
      <button id="toggleDarkMode" class="btn btn-secondary mb-3">Toggle Dark Mode</button>
      <button id="logoutBtn" class="btn btn-danger mb-3">Logout</button>


    </form>

    <h4>Equipment List</h4>
    <table class="table table-striped">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Category</th><th>Quantity</th></tr>
      </thead>
      <tbody id="equipmentTable"></tbody>
    </table>
  </div>
  <script src="js/admin.js"></script>
</body>
</html>
