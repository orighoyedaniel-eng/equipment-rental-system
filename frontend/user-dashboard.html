<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container mt-4">
    <h2>User Dashboard</h2>
    <form id="searchForm" class="d-flex mb-3">
      <input type="text" name="query" class="form-control me-2" placeholder="Search equipment...">
      <button class="btn btn-primary">Search</button>
      <button id="logoutBtn" class="btn btn-danger mb-3">Logout</button>

    </form>
    <h4>Available Equipment</h4>
    <table class="table table-striped">
      <thead>
        <tr><th>ID</th><th>Name</th><th>Category</th><th>Quantity</th><th>Action</th></tr>
      </thead>
      <tbody id="equipmentList"></tbody>
    </table>

    <h4>My Rentals</h4>
    <table class="table table-striped">
      <thead>
        <tr><th>ID</th><th>Equipment</th><th>Status</th><th>Due Date</th><th>Action</th></tr>
      </thead>
      <tbody id="rentalList"></tbody>
    </table>
  </div>
  <script src="js/user.js"></script>
</body>
</html>
